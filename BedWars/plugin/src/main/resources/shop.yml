data:
  # ==================== 护甲类别 ====================
  - stack:
      type: diamond_chestplate
      amount: 1
      display-name: "护甲"
      lore:
        - "用护甲保护自己！点击进入。"
    items:
      - price: 1
        properties: "applycolorbyteam"
        stack:
          type: leather_helmet
          enchants:
            protection: 1
      - price: 1
        properties: "applycolorbyteam"
        stack:
          type: leather_leggings
          enchants:
            protection: 1
      - price: 1
        properties: "applycolorbyteam"
        stack:
          type: leather_boots
          enchants:
            protection: 1
      - price: 1
        stack:
          type: chainmail_chestplate
          enchants:
            protection: 1
      - price: 3
        stack:
          type: chainmail_chestplate
          enchants:
            protection: 2
      - price: 7
        stack:
          type: chainmail_chestplate
          enchants:
            protection: 3
      - price: 10
        stack:
          type: iron_helmet
          display-name: "铁头盔"
          enchants:
            protection: 2

  # ==================== 剑类别 ====================
  - stack:
      type: diamond_sword
      amount: 1
      display-name: "剑"
      lore:
        - "点击获取攻击敌人的剑"
    column: center
    items:
      - price: 8
        stack:
          type: stick
          enchants:
            knockback: 1
      - price: 1
        stack:
          type: golden_sword
          enchants:
            sharpness: 1
      - price: 3
        stack:
          type: golden_sword
          enchants:
            sharpness: 2
      - price: 7
        stack:
          type: golden_sword
          enchants:
            sharpness: 3
      - price: 3
        stack:
          type: golden_sword
          enchants:
            sharpness: 2
            knockback: 1
      - price: 15
        stack:
          type: golden_axe
          display-name: "无限之斧"
          enchants:
            sharpness: 1
            unbreaking: 1
            knockback: 1

  # ==================== 弓类别 ====================
  - stack:
      type: bow
      amount: 1
      display-name: "弓"
      lore:
        - "用这些精美的弓证明你的箭术"
    column: right
    items:
      - price: 3
        stack:
          type: bow
          enchants:
            infinity: 1
      - price: 7
        stack:
          type: bow
          enchants:
            infinity: 1
            power: 1
      - price: 13
        stack:
          type: bow
          enchants:
            infinity: 1
            power: 2
      - price: 14
        stack:
          type: bow
          enchants:
            infinity: 1
            flame: 1
      - price: 15
        stack:
          type: bow
          enchants:
            infinity: 1
            flame: 1
            punch: 1
      - price: 1
        stack:
          type: arrow
          amount: 1

  # ==================== 食物类别 ====================
  - stack:
      type: cooked_porkchop
      amount: 1
      display-name: "食物"
      lore:
        - "饿了吗？来点吃的吧。"
    row: 3
    column: 2
    items:
      - price: 4
        stack:
          type: cooked_porkchop
          amount: 2
      - price: 2
        stack:
          type: golden_apple
          amount: 1
      - price: 5
        stack:
          type: bread
          amount: 10
      - price: 30
        stack:
          type: golden_apple
          amount: 1
          display-name: "金苹果"

  # ==================== 药水类别 ====================
  - stack:
      type: potion
      display-name: "药水"
      lore:
        - "不够吗？使用这些药水会让你感觉更好！"
      potion-type: strength
    row: 3
    column: 6
    items:
      - price: 3
        stack:
          type: potion
          potion-type: healing
      - price: 5
        stack:
          type: potion
          potion-type: strong_healing
      - price: 7
        stack:
          type: potion
          potion-type: swiftness
      - price: 1
        stack:
          type: potion
          potion-type: strength
      - price: 3
        stack:
          type: potion
          potion-type: regeneration

  # ==================== 方块类别 ====================
  - stack:
      type: sandstone
      amount: 1
      display-name: "方块"
      lore:
        - "搭路去别人家？用这些方块吧。"
    linebreak: before
    items:
      - price: 1
        stack:
          type: cut_sandstone
          amount: 2
      - price: 7
        stack:
          type: end_stone
          amount: 3
      - price: 3
        stack:
          type: iron_block
          amount: 1
      - price: 15
        stack:
          type: glowstone
          amount: 4
      - price: 4
        properties: "applycolorbyteam"
        stack:
          type: glass
          amount: 1
      - price: 4
        properties: "applycolorbyteam"
        stack:
          type: wool
          amount: 16
          display-name: "羊毛"
      - price: 16
        stack:
          type: oak_planks
          amount: 16
          display-name: "木板"

  # ==================== 实用物品类别 ====================
  - stack:
      type: tnt
      amount: 1
      display-name: "实用物品"
      lore:
        - "寻找有用的东西？这里有一些！"
    column: center
    items:
      - price: 1
        stack:
          type: chest
          amount: 1
      - price: 1
        stack:
          type: ender_chest
          amount: 1
      - price: 3
        stack:
          type: tnt
          amount: 1
          display-name: "自动点燃 TNT"
        properties:
          - name: "AutoIgniteableTnt"
            explosion-time: 5
            damage-placer: false
      - price: 7
        stack:
          type: gunpowder
          amount: 1
          display-name: "传送粉末"
          lore:
            - "使用后将在6秒内传送至重生点"
            - "警告：移动会取消传送"
        properties:
          - name: "WarpPowder"
            delay: 6
      - price: 3
        stack:
          type: string
          amount: 1
          display-name: "陷阱"
          lore:
            - "敌人触发陷阱时会通知你的队伍"
            - "并使敌人受到负面效果"
        properties:
          - name: "Trap"
            data:
              - sound: ENTITY_SHEEP_AMBIENT
              - effect:
                  effect: blindness
                  amplifier: 2
                  duration: 100
                  ambient: true
                  particles: true
                  icon: true
              - effect:
                  effect: weakness
                  amplifier: 2
                  duration: 100
                  ambient: true
                  particles: true
                  icon: true
              - effect:
                  effect: slowness
                  amplifier: 2
                  duration: 100
                  ambient: true
                  particles: true
                  icon: true
      - price: 6
        stack:
          type: iron_boots
          amount: 1
          display-name: "磁力鞋"
          lore:
            - "穿着时有75%的概率免疫击退"
        properties:
          - name: "MagnetShoes"
            probability: 75
      - price: 5
        stack:
          type: compass
          amount: 1
          display-name: "追踪器"
          lore:
            - "显示最近敌人的距离和方向"
        properties: "Tracker"
      - price: 15
        stack:
          type: blaze_rod
          amount: 1
          display-name: "救援平台"
          lore:
            - "在脚下生成一个平台，防止掉落虚空"
        properties:
          - name: "rescueplatform"
            delay: 5
      - price: 5
        stack:
          type: ender_eye
          amount: 1
          display-name: "箭矢阻挡器"
          lore:
            - "使用后一段时间内免疫弹射物伤害"
        properties:
          - name: "arrowblocker"
            delay: 5
      - price: 64
        stack:
          type: bricks
          amount: 1
          display-name: "防护墙"
          lore:
            - "瞬间建造一堵墙保护自己"
        properties:
          - name: "protectionwall"
      - price: 24
        stack:
          type: ghast_spawn_egg
          amount: 1
          display-name: "傀儡"
          lore:
            - "召唤一个铁傀儡保护你的队伍"
        properties:
          - name: "Golem"
            speed: 0.25
            follow-range: 16.0
      - price: 10
        stack:
          type: sheep_spawn_egg
          amount: 1
          display-name: "TNT 羊"
          lore:
            - "召唤一只爆炸羊追踪敌人"
        properties: "TNTSheep"
      - price: 40
        stack:
          type: fire_charge
          amount: 1
          display-name: "火球"
          lore:
            - "投掷火球，爆炸并点燃敌人"
        properties: "ThrowableFireball"

      # 新增黑曜石转换粉
      - price: 300
        stack:
          type: REDSTONE
          amount: 1
          display-name: "&d黑曜石转换粉"
          lore:
            - "&7右键点击黑曜石"
            - "&7等待3秒转换为木板"
            - "&7冷却时间: 5秒"
        # 此处假设插件支持自定义特殊物品，如需对应功能请安装相应扩展

      # 新增回春床
      - price: 512
        properties: "applycolorbyteam"
        stack:
          type: bed
          amount: 1
          display-name: "回春床"
          lore:
            - "可以修复或保护床的特殊物品"
        # 此处假设插件支持特殊床功能

      # 新增搭桥蛋
      - price: 100
        stack:
          type: egg
          amount: 1
          display-name: "搭桥蛋"
          lore:
            - "投掷后生成一座桥梁"
        # 此处假设插件支持搭桥蛋功能

      # 新增其他实用物品（自由发挥）
      - price: 50
        stack:
          type: ender_pearl
          amount: 1
          display-name: "末影珍珠"
          lore:
            - "传送到投掷点"
      - price: 20
        stack:
          type: water_bucket
          amount: 1
          display-name: "水桶"
      - price: 30
        stack:
          type: lava_bucket
          amount: 1
          display-name: "岩浆桶"
      - price: 15
        stack:
          type: cobweb
          amount: 1
          display-name: "蜘蛛网"
      - price: 5
        stack:
          type: snowball
          amount: 16
          display-name: "雪球"
      - price: 10
        stack:
          type: fire_charge
          amount: 1
          display-name: "火焰弹"

  # ==================== 镐类别 ====================
  - stack:
      type: diamond_pickaxe
      amount: 1
      display-name: "镐"
      lore:
        - "想快速破坏别人的方块？用这些镐。"
    column: right
    items:
      - price: 4
        stack:
          type: iron_pickaxe
          amount: 1
          enchants:
            fortune: 1
      - price: 2
        stack:
          type: iron_pickaxe
          amount: 1
          enchants:
            fortune: 2
      - price: 1
        stack:
          type: iron_pickaxe
          amount: 1
          enchants:
            fortune: 3